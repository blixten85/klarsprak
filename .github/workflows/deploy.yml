name: Deploy

# Auto-deploy till Cloudflare Workers vid push till main. Enkel statisk
# assets-worker (public/index.html) — inget build-steg, bara wrangler deploy.
#
# Secrets (Repo → Settings → Secrets → Actions):
#   CLOUDFLARE_API_TOKEN     — Workers Scripts:Edit
#   CLOUDFLARE_ACCOUNT_ID    — kontots ID

on:
  push:
    branches: [main]
  workflow_dispatch: {}
  schedule:
    # Säkerhetsnät: auto-merge-boten (Bot Auto-Merge) mergar claude/-PR:ar med
    # standard-GITHUB_TOKEN, vilket GitHub inte låter trigga push-workflows.
    # Utan detta blir mergad kod tyst odeployad. wrangler deploy är
    # idempotent, så en periodisk körning kostar inget om main redan är live.
    - cron: '*/30 * * * *'

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24.18.0
      - name: Install
        run: npm install
      - name: Deploy
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
