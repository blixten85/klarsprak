<title>Klarspråk — granskning</title>
<style>
  :root {
    --paper: #f4f5f1;
    --paper-raised: #ffffff;
    --ink: #1b2422;
    --ink-soft: #4a534f;
    --line: #d8dad3;
    --navy: #2c3b5c;
    --navy-soft: #e7eaf2;
    --navy-line: #c3cbdd;
    --ochre: #8a5f1f;
    --ochre-soft: #f4ead4;
    --ochre-line: #e0cb9c;
    --gap-bg: #fbf3e2;
    --gap-border: #e4c887;
    --focus: #2c3b5c;
    --danger: #8a2f2f;
    --danger-soft: #f6e4e4;
  }

  :root[data-theme="dark"] {
    --paper: #12161a;
    --paper-raised: #191e23;
    --ink: #e7e5dc;
    --ink-soft: #a9afa8;
    --line: #2a3138;
    --navy: #8a9dcf;
    --navy-soft: #1c2436;
    --navy-line: #384566;
    --ochre: #dda94f;
    --ochre-soft: #2c2415;
    --ochre-line: #4a3c1e;
    --gap-bg: #21190e;
    --gap-border: #4a3c1e;
    --focus: #8a9dcf;
    --danger: #d98080;
    --danger-soft: #2c1717;
  }

  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --paper: #12161a;
      --paper-raised: #191e23;
      --ink: #e7e5dc;
      --ink-soft: #a9afa8;
      --line: #2a3138;
      --navy: #8a9dcf;
      --navy-soft: #1c2436;
      --navy-line: #384566;
      --ochre: #dda94f;
      --ochre-soft: #2c2415;
      --ochre-line: #4a3c1e;
      --gap-bg: #21190e;
      --gap-border: #4a3c1e;
      --focus: #8a9dcf;
      --danger: #d98080;
      --danger-soft: #2c1717;
    }
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    line-height: 1.5;
  }

  .wrap {
    max-width: 820px;
    margin: 0 auto;
    padding: 3rem 1.5rem 5rem;
  }

  header {
    border-bottom: 3px solid var(--ink);
    padding-bottom: 1.5rem;
    margin-bottom: 2rem;
  }

  .eyebrow {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 0.7rem;
  }

  h1 {
    font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    font-weight: 400;
    font-size: 2rem;
    margin: 0;
  }

  .login-box {
    background: var(--paper-raised);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 1.5rem;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
  }

  .login-box label {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }

  .login-box input {
    font-family: inherit;
    font-size: 0.92rem;
    padding: 0.6rem 0.75rem;
    border: 1.5px solid var(--line);
    border-radius: 7px;
    background: var(--paper);
    color: var(--ink);
  }

  button {
    font-family: inherit;
    font-size: 0.88rem;
    padding: 0.6rem 1.1rem;
    border-radius: 7px;
    cursor: pointer;
    border: 1.5px solid var(--ink);
    background: transparent;
    color: var(--ink);
  }

  button:hover { background: var(--ink); color: var(--paper); }
  button:focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; }
  button:disabled { opacity: 0.6; cursor: default; }

  .btn-approve {
    border-color: var(--navy);
    color: var(--navy);
  }
  .btn-approve:hover { background: var(--navy); color: var(--navy-soft); }

  .btn-reject {
    border-color: var(--danger);
    color: var(--danger);
  }
  .btn-reject:hover { background: var(--danger); color: var(--danger-soft); }

  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.2rem;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .count { color: var(--ink-soft); font-size: 0.88rem; }

  .card {
    background: var(--paper-raised);
    border: 1px solid var(--line);
    border-radius: 10px;
    margin-bottom: 1rem;
    padding: 1.1rem 1.3rem;
  }

  .card-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 1rem;
    flex-wrap: wrap;
    margin-bottom: 0.6rem;
  }

  .term {
    font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    font-size: 1.25rem;
    margin: 0;
  }

  .meta {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 0.72rem;
    color: var(--ink-soft);
  }

  .field-block { margin-bottom: 0.6rem; }

  .field-label {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 0.66rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
    display: block;
    margin-bottom: 0.2rem;
  }

  .field-block p { margin: 0; font-size: 0.9rem; white-space: pre-wrap; }

  .card-actions {
    display: flex;
    gap: 0.6rem;
    margin-top: 0.9rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .note-input {
    flex: 1 1 200px;
    min-width: 0;
    font-family: inherit;
    font-size: 0.85rem;
    padding: 0.5rem 0.7rem;
    border: 1.5px solid var(--line);
    border-radius: 6px;
    background: var(--paper);
    color: var(--ink);
  }

  .empty, .status-msg {
    color: var(--ink-soft);
    font-size: 0.92rem;
    padding: 1rem 0;
  }

  .error-msg {
    color: var(--danger);
    font-size: 0.88rem;
    padding: 0.6rem 0;
  }
</style>

<div class="wrap">
  <header>
    <div class="eyebrow">klarspråk.denied.se · granskning</div>
    <h1>Granskningskö</h1>
  </header>

  <div id="login-view" class="login-box">
    <label for="token-input">Admin-token</label>
    <input id="token-input" type="password" autocomplete="off" placeholder="Klistra in ADMIN_TOKEN" />
    <button id="login-btn" type="button">Logga in</button>
    <p class="error-msg" id="login-error" hidden></p>
  </div>

  <div id="queue-view" hidden>
    <div class="toolbar">
      <p class="count" id="count"></p>
      <button id="logout-btn" type="button">Logga ut</button>
    </div>
    <div id="list"></div>
  </div>
</div>

<script>
  const loginView = document.getElementById('login-view');
  const queueView = document.getElementById('queue-view');
  const tokenInput = document.getElementById('token-input');
  const loginBtn = document.getElementById('login-btn');
  const loginError = document.getElementById('login-error');
  const logoutBtn = document.getElementById('logout-btn');
  const listEl = document.getElementById('list');
  const countEl = document.getElementById('count');

  function esc(s) {
    return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function getToken() {
    return sessionStorage.getItem('klarsprak_admin_token');
  }

  function setToken(t) {
    sessionStorage.setItem('klarsprak_admin_token', t);
  }

  function clearToken() {
    sessionStorage.removeItem('klarsprak_admin_token');
  }

  async function loadQueue() {
    const token = getToken();
    if (!token) return showLogin();

    listEl.innerHTML = '<p class="status-msg">Laddar…</p>';
    try {
      const res = await fetch('/api/admin/queue', {
        headers: { authorization: 'Bearer ' + token },
      });
      if (res.status === 401) {
        clearToken();
        return showLogin('Ogiltig token.');
      }
      if (!res.ok) throw new Error('Kunde inte hämta kön (' + res.status + ').');
      const body = await res.json();
      renderQueue(body.submissions || []);
      showQueue();
    } catch (err) {
      listEl.innerHTML = '<p class="error-msg">' + esc(err.message) + '</p>';
      showQueue();
    }
  }

  function renderQueue(items) {
    countEl.textContent = items.length + (items.length === 1 ? ' väntande förslag' : ' väntande förslag');
    if (!items.length) {
      listEl.innerHTML = '<p class="empty">Inga väntande förslag.</p>';
      return;
    }
    listEl.innerHTML = items.map(item => `
      <article class="card" data-id="${item.id}">
        <div class="card-head">
          <h2 class="term">${esc(item.term)}</h2>
          <span class="meta">#${item.id} · ${esc(item.created_at)}</span>
        </div>
        ${item.foreslagen_vardagsbetydelse ? `<div class="field-block"><span class="field-label">Vardagsbetydelse</span><p>${esc(item.foreslagen_vardagsbetydelse)}</p></div>` : ''}
        ${item.foreslagen_juridisk_definition ? `<div class="field-block"><span class="field-label">Juridisk definition</span><p>${esc(item.foreslagen_juridisk_definition)}</p></div>` : ''}
        ${item.foreslagen_exempel ? `<div class="field-block"><span class="field-label">Exempel</span><p>${esc(item.foreslagen_exempel)}</p></div>` : ''}
        ${item.inskickare_namn ? `<div class="field-block"><span class="field-label">Namn</span><p>${esc(item.inskickare_namn)}</p></div>` : ''}
        ${item.inskickare_kommentar ? `<div class="field-block"><span class="field-label">Kommentar</span><p>${esc(item.inskickare_kommentar)}</p></div>` : ''}
        <div class="card-actions">
          <input type="text" class="note-input" placeholder="Granskningsnotering (valfritt)" />
          <button type="button" class="btn-approve" data-action="approve">Godkänn</button>
          <button type="button" class="btn-reject" data-action="reject">Avslå</button>
        </div>
      </article>
    `).join('');
  }

  listEl.addEventListener('click', async e => {
    const btn = e.target.closest('button[data-action]');
    if (!btn) return;
    const card = btn.closest('.card');
    const id = card.dataset.id;
    const note = card.querySelector('.note-input').value.trim();
    const action = btn.dataset.action;

    card.querySelectorAll('button').forEach(b => b.disabled = true);

    try {
      const res = await fetch('/api/admin/review/' + id, {
        method: 'POST',
        headers: {
          'content-type': 'application/json',
          authorization: 'Bearer ' + getToken(),
        },
        body: JSON.stringify({ action, note: note || undefined }),
      });
      if (res.status === 401) {
        clearToken();
        return showLogin('Ogiltig token.');
      }
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        throw new Error(body.error || 'Något gick fel.');
      }
      card.remove();
      const remaining = listEl.querySelectorAll('.card').length;
      countEl.textContent = remaining + ' väntande förslag';
      if (!remaining) listEl.innerHTML = '<p class="empty">Inga väntande förslag.</p>';
    } catch (err) {
      card.querySelectorAll('button').forEach(b => b.disabled = false);
      alert(err.message);
    }
  });

  function showLogin(errorMsg) {
    loginView.hidden = false;
    queueView.hidden = true;
    loginError.hidden = !errorMsg;
    if (errorMsg) loginError.textContent = errorMsg;
  }

  function showQueue() {
    loginView.hidden = true;
    queueView.hidden = false;
  }

  loginBtn.addEventListener('click', () => {
    const val = tokenInput.value.trim();
    if (!val) return;
    setToken(val);
    tokenInput.value = '';
    loadQueue();
  });

  tokenInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') loginBtn.click();
  });

  logoutBtn.addEventListener('click', () => {
    clearToken();
    showLogin();
  });

  if (getToken()) {
    loadQueue();
  } else {
    showLogin();
  }
</script>
